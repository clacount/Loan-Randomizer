<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch LendingFair</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f8;
      --panel: #ffffff;
      --text: #1c2430;
      --muted: #5e6b7a;
      --border: #d8e0e8;
      --accent: #256d85;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .launcher {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 10px 26px rgba(28, 36, 48, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.9rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.55;
    }

    .muted {
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      background: #f7f9fc;
    }

    a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
  </style>
  <script>
    window.addEventListener('load', function redirectToApp() {
      window.location.replace('./src/app/index.html');
    });
  </script>
</head>
<body>
  <main class="launcher">
    <h1>LendingFair Launcher</h1>
    <p>Opening LendingFair now.</p>
    <p class="muted">If the app does not open automatically, use one of the links below.</p>
    <div class="actions">
      <a class="primary" href="./src/app/index.html">Open LendingFair App</a>
      <a href="./docs/customer/index.html">Open Customer Documentation</a>
    </div>
  </main>
</body>
</html>
